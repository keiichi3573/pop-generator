<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POP自動生成｜A5固定・スマホ/タブレット対応</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@500;700&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    :root{ --accent:#c82020; --paper:#fff; --bg:#f6f7fb; --muted:#6b7280 }
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{margin:0;font-family:'Noto Sans JP',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg)}

    header{position:sticky;top:0;z-index:20;background:#ffffffcc;backdrop-filter:blur(6px);border-bottom:1px solid #e5e7eb}
    .wrap{max-width:1160px;margin:0 auto;padding:10px 14px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brand{font-weight:900}
    .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    select,input[type="text"],input[type="number"],textarea{padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;background:#fff}

    .grid{max-width:1160px;margin:0 auto;padding:14px;display:grid;grid-template-columns:1fr 420px;gap:16px}
    @media (max-width:980px){.grid{grid-template-columns:1fr}}

    .a5{width:148mm;height:210mm;background:var(--paper);margin:auto;border:10px solid #d4af37;box-shadow:0 8px 20px rgba(0,0,0,.15);display:flex;flex-direction:column;justify-content:flex-start;padding:10mm;overflow:hidden}
    .headline{text-align:center;font-size:20pt;font-weight:900;margin-bottom:5mm}
    .ribbon{border:3px solid #e11d48;color:#e11d48;font-weight:900;text-align:center;padding:6px 10px;border-radius:8px;display:inline-block;margin:auto}
    .middle{display:flex;gap:6mm;margin:7mm 0 6mm}
    .middle.reverse{flex-direction:row-reverse}
    .photo-box{width:50%;aspect-ratio:4/3;background:#f1f5f9;border-radius:10px;overflow:hidden;position:relative}
    .photo-box img{width:100%;height:100%;object-fit:cover;display:block}
    .desc{width:50%;font-size:11pt;line-height:1.8}
    .product{text-align:center;font-size:18pt;font-weight:900;margin-top:4mm}
    .price{text-align:center;margin-top:1mm}
    .before{font-size:12pt;color:#555;margin-bottom:1.5mm}
    .discount{font-size:24pt;font-weight:900;color:#dc2626;margin-bottom:1.5mm}
    .now{font-size:18pt;font-weight:900;color:#111}
    .checklist{margin-top:3mm;list-style:none;padding:0;font-size:10.5pt}
    .checklist li{margin:2px 0;position:relative;padding-left:20px}
    .checklist li:before{content:'✔';position:absolute;left:0;color:#2563eb;font-weight:900}
    .cta{text-align:center;margin-top:6mm}
    .cta .box{display:inline-block;background:var(--accent);color:#fff;padding:10px 26px;border-radius:10px;font-weight:800}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:16px}
    .panel h3{margin:0 0 10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .row-3{display:grid;grid-template-columns:1fr;gap:12px}
    .full{grid-column:1/-1}
    .hint{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand">POP自動生成（A5固定・スマホ対応）</div>
      <div class="tools">
        <label>テーマ
          <select id="theme">
            <option value="lux">高級感</option>
            <option value="cute">かわいい</option>
            <option value="fresh">爽やか</option>
          </select>
        </label>
        <label>フォント
          <select id="font">
            <option value="gothic">ゴシック</option>
            <option value="mincho">明朝</option>
            <option value="hand">手書き</option>
          </select>
        </label>
        <button class="btn" id="swap">写真⇄説明</button>
        <button class="btn" id="gen">① 候補を3つ生成</button>
        <button class="btn" id="apply">② 反映</button>
        <button class="btn" id="png">PNG保存</button>
        <button class="btn" id="pdf">PDF保存</button>
        <button class="btn" id="pdfA4x2">A4で2面付けPDF</button>
      </div>
    </div>
  </header>

  <main class="grid">
    <section>
      <div id="stage" class="a5">
        <div class="headline" id="v_headline">キャッチコピーをここに表示</div>
        <div class="ribbon" id="v_ribbon">おすすめポイントを入力してください</div>
        <div id="middle" class="middle">
          <label class="photo-box" title="クリックで写真を選択">
            <input id="f_photo" type="file" accept="image/*" style="opacity:0;position:absolute;inset:0;cursor:pointer;">
            <img id="photoImg" alt="" style="display:none"/>
          </label>
          <div class="desc">
            <div id="v_descTitle" style="font-weight:900;font-size:14pt;margin-bottom:6px">説明タイトルがここに入ります</div>
            <div id="v_desc">ここに説明文が入ります。生成ボタンで自動作成も可能です。</div>
          </div>
        </div>
        <div class="product" id="v_product">メニュー名・商品名がここに入ります</div>
        <div class="price">
          <div class="before" id="v_before"></div>
          <div class="discount" id="v_discountLine"></div>
          <div class="now" id="v_now"></div>
        </div>
        <ul class="checklist" id="v_checks">
          <li>おすすめポイント1</li>
          <li>おすすめポイント2</li>
          <li>おすすめポイント3</li>
        </ul>
        <div class="cta"><div class="box">ご興味のある方はスタッフまで♪</div></div>
      </div>
    </section>

    <aside class="panel" id="editorPanel">
      <h3>作成画面</h3>
      <div class="row">
        <p>
          <label>商品名 / メニュー名</label>
          <input id="f_name" type="text" value="" placeholder="例：○○カラー、○○トリートメントなど" />
        </p>
        <p>
          <label>赤枠帯（オススメ・残数など）</label>
          <input id="f_ribbon" type="text" value="" placeholder="例：今だけ特別価格！、残りわずか！など" />
        </p>
      </div>
      <div class="row">
        <p>
          <label>特徴ワード <span class="hint">※ カンマで区切ると効果的（例：ツヤ, 保湿, ダメージケア）</span></label>
          <input id="f_feats" type="text" value="" placeholder="例：ツヤ, 保湿, ダメージケア" />
        </p>
        <p>
          <label>説明の要点（箇条書き可）</label>
          <textarea id="f_points" rows="3" placeholder="例：○○に使える／うるおい持続／使うほどツヤ感アップ"></textarea>
        </p>
      </div>
      <div class="row">
        <p class="full">
          <label>キャッチコピー（自動生成 or 手動）</label>
          <input id="f_headline" type="text" placeholder="生成ボタンで自動作成、または手動入力" />
          <button id="btnGenLocal" class="btn" style="margin-top:6px">キャッチ/説明/チェック候補を3つ生成</button>
        </p>
      </div>
      <div class="row-3">
        <p><label>定価（円）</label><input id="f_price" type="number" value="" placeholder="例：5280" /></p>
        <p><label>割引額（円）</label><input id="f_offAmt" type="number" value="" placeholder="例：528" /></p>
        <p><label>割引率（%）</label><input id="f_offPct" type="number" value="" placeholder="例：10" /></p>
      </div>
      <hr style="margin:14px 0;border:none;border-top:1px dashed #e5e7eb">
      <div><strong>AI候補</strong><div id="aiArea" class="hint" style="margin-top:6px">※ 生成ボタンでここに候補が出ます</div></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
    // JavaScript部分（変更なし・前回の動作そのまま）
  </script>
</body>
</html>
