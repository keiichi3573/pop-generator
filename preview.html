<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POPプレビュー（A4 2面付け）</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@500;700&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f6fb;
      --paper:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --accent:#c82020;
      --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Noto Sans JP',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:20;
      background:#ffffffd9;
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
    }
    .topbar{
      max-width:1200px;
      margin:0 auto;
      padding:10px 14px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{font-weight:900;font-size:15px}
    .tools{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .btn:active{transform:translateY(1px)}
    .btn.primary{
      background:#111827;
      color:#fff;
      border-color:#111827;
    }

    .page{
      max-width:1200px;
      margin:0 auto;
      padding:18px 14px 40px;
    }

    .note{
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      color:var(--muted);
      font-size:13px;
      margin-bottom:16px;
    }

    .sheet{
      width:297mm;
      min-height:210mm;
      margin:0 auto;
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,.12);
      padding:8mm;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6mm;
      justify-content:center;
      align-content:start;
    }

    .pop{
      width:140mm;
      height:194mm;
      background:var(--paper);
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      padding:8mm;
      border:4px solid #d1d5db;
      border-radius:12px;
    }

    .font-gothic{ font-family:'Noto Sans JP',sans-serif; }
    .font-mincho{ font-family:'Shippori Mincho','Noto Sans JP',serif; }
    .font-round{ font-family:'Kosugi Maru','Noto Sans JP',sans-serif; }

    .headline{
      text-align:center;
      font-size:20pt;
      font-weight:900;
      line-height:1.35;
      margin:0 0 4mm;
      word-break:break-word;
    }

    .ribbon-wrap{
      text-align:center;
      margin-bottom:5mm;
      min-height:14mm;
    }
    .ribbon{
      display:inline-block;
      border:3px solid #e11d48;
      color:#e11d48;
      font-weight:900;
      text-align:center;
      padding:5px 12px;
      border-radius:8px;
      font-size:12pt;
      max-width:100%;
      word-break:break-word;
    }

    .middle{
      display:flex;
      gap:5mm;
      margin-bottom:5mm;
      align-items:flex-start;
    }

    .photo-box{
      width:50%;
      aspect-ratio:4/3;
      background:#f1f5f9;
      border-radius:10px;
      overflow:hidden;
      flex-shrink:0;
    }
    .photo-box img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:none;
    }

    .desc{
      width:50%;
      font-size:10.5pt;
      line-height:1.75;
      word-break:break-word;
    }
    .desc-title{
      font-weight:900;
      font-size:13pt;
      margin-bottom:4px;
      line-height:1.5;
    }

    .product{
      text-align:center;
      font-size:18pt;
      font-weight:900;
      line-height:1.4;
      margin:3mm 0 2mm;
      word-break:break-word;
    }

    .price{
      text-align:center;
      margin-top:1mm;
    }
    .before{
      font-size:11pt;
      color:#555;
      min-height:1.5em;
    }
    .discount{
      font-size:20pt;
      font-weight:900;
      color:#dc2626;
      min-height:1.5em;
    }
    .now{
      font-size:17pt;
      font-weight:900;
      color:#111;
      min-height:1.5em;
    }

    .checklist{
      margin:4mm 0 0;
      padding:0;
      list-style:none;
      font-size:10pt;
      line-height:1.65;
    }
    .checklist li{
      position:relative;
      padding-left:18px;
      margin:2px 0;
      word-break:break-word;
    }
    .checklist li::before{
      content:'✔';
      position:absolute;
      left:0;
      top:0;
      color:#2563eb;
      font-weight:900;
    }

    .cta{
      margin-top:auto;
      text-align:center;
      padding-top:6mm;
    }
    .cta-box{
      display:inline-block;
      background:var(--accent);
      color:#fff;
      padding:10px 22px;
      border-radius:10px;
      font-weight:800;
      font-size:12pt;
      max-width:100%;
      word-break:break-word;
    }

    .cutline{
      position:absolute;
      top:0;
      right:-3mm;
      width:1px;
      height:100%;
      background:repeating-linear-gradient(
        to bottom,
        #cbd5e1 0 6px,
        transparent 6px 12px
      );
    }

    @media (max-width:980px){
      .sheet{
        width:auto;
        min-height:auto;
        padding:0;
        background:transparent;
        box-shadow:none;
        grid-template-columns:1fr;
        gap:14px;
      }
      .pop{
        width:min(100%, 420px);
        height:auto;
        min-height:590px;
        margin:0 auto;
      }
      .cutline{ display:none; }
    }

    @page{
      size:A4 landscape;
      margin:8mm;
    }

    @media print{
      body{ background:#fff; }
      header, .note{ display:none !important; }
      .page{
        max-width:none;
        margin:0;
        padding:0;
      }
      .sheet{
        width:297mm;
        min-height:210mm;
        box-shadow:none;
        margin:0;
        padding:0;
        gap:4mm;
      }
      .pop{
        width:142mm;
        height:194mm;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">POPプレビュー（A4に2枚表示）</div>
      <div class="tools">
        <button class="btn" id="backBtn">入力画面へ戻る</button>
        <button class="btn primary" id="printBtn">印刷する</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="note">
      この画面は印刷専用です。A4横で、同じPOPを2枚並べて出力します。
    </div>

    <section class="sheet">
      <article class="pop font-gothic" id="pop1">
        <div class="headline js-headline">キャッチコピーがここに入ります</div>

        <div class="ribbon-wrap">
          <div class="ribbon js-ribbon">おすすめポイント</div>
        </div>

        <div class="middle">
          <div class="photo-box">
            <img class="js-photo" alt="">
          </div>
          <div class="desc">
            <div class="desc-title js-descTitle">説明タイトル</div>
            <div class="js-desc">説明文がここに入ります。</div>
          </div>
        </div>

        <div class="product js-product">商品名・メニュー名</div>

        <div class="price">
          <div class="before js-before"></div>
          <div class="discount js-discount"></div>
          <div class="now js-now"></div>
        </div>

        <ul class="checklist">
          <li class="js-check1">おすすめポイント1</li>
          <li class="js-check2">おすすめポイント2</li>
          <li class="js-check3">おすすめポイント3</li>
        </ul>

        <div class="cta">
          <div class="cta-box js-cta">ご興味のある方はスタッフまで♪</div>
        </div>

        <div class="cutline"></div>
      </article>

      <article class="pop font-gothic" id="pop2">
        <div class="headline js-headline">キャッチコピーがここに入ります</div>

        <div class="ribbon-wrap">
          <div class="ribbon js-ribbon">おすすめポイント</div>
        </div>

        <div class="middle">
          <div class="photo-box">
            <img class="js-photo" alt="">
          </div>
          <div class="desc">
            <div class="desc-title js-descTitle">説明タイトル</div>
            <div class="js-desc">説明文がここに入ります。</div>
          </div>
        </div>

        <div class="product js-product">商品名・メニュー名</div>

        <div class="price">
          <div class="before js-before"></div>
          <div class="discount js-discount"></div>
          <div class="now js-now"></div>
        </div>

        <ul class="checklist">
          <li class="js-check1">おすすめポイント1</li>
          <li class="js-check2">おすすめポイント2</li>
          <li class="js-check3">おすすめポイント3</li>
        </ul>

        <div class="cta">
          <div class="cta-box js-cta">ご興味のある方はスタッフまで♪</div>
        </div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
